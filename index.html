<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1f6f68" />
    <title>StayUp课表</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">第 <span id="currentWeek">1</span> 周</p>
          <h1>StayUp课表</h1>
          <p class="subtitle"><span id="activeScheduleName">默认课表</span> · 导入、校对、每天准时上课</p>
        </div>
        <button class="icon-button" id="settingsButton" aria-label="设置开学日期">设置</button>
      </header>

      <section class="today-strip" aria-label="今日课程">
        <div>
          <span class="muted">今天</span>
          <strong id="todayLabel">周一</strong>
        </div>
        <div id="nextClass" class="next-class">暂无课程</div>
      </section>

      <nav class="tabs" aria-label="功能切换">
        <button class="tab active" data-panel="schedulePanel">课表</button>
        <button class="tab" data-panel="importPanel">导入</button>
        <button class="tab" data-panel="manualPanel">手动</button>
        <button class="tab" data-panel="reviewPanel">校对</button>
      </nav>

      <section class="panel active" id="schedulePanel">
        <div class="schedule-controls" aria-label="课表视图控制">
          <button class="ghost compact-button" id="prevWeekButton" type="button">上一周</button>
          <strong id="viewWeekLabel">第 1 周</strong>
          <button class="ghost compact-button" id="nextWeekButton" type="button">下一周</button>
          <button class="secondary compact-button" id="todayWeekButton" type="button">本周</button>
          <button class="secondary compact-button" id="viewModeButton" type="button" aria-pressed="false">整周</button>
        </div>
        <div class="week-grid" id="weekGrid" aria-label="周课表"></div>
      </section>

      <section class="panel" id="importPanel">
        <div class="control-block">
          <label for="importUrl">从网页导入</label>
          <div class="inline-row">
            <input id="importUrl" inputmode="url" placeholder="粘贴登录后的课表页 URL，可选" />
            <button id="fetchButton">尝试读取</button>
          </div>
          <p class="hint">多数学校教务系统会限制跨站读取；失败时请登录教务系统后复制课表文字到下方。</p>
        </div>

        <div class="control-block">
          <label for="rawSchedule">粘贴网页文本 / 表格 / OCR 文字</label>
          <textarea id="rawSchedule" rows="7" placeholder="例如：高等数学A 周一 第1-2节 1-16周 教学楼A101"></textarea>
          <button id="parseButton">识别导入</button>
        </div>

        <div class="control-block">
          <label for="imageInput">图片识别导入</label>
          <label for="ocrServiceUrl">电脑 IP（可选，高精度识别）
            <div class="inline-row">
              <input id="ocrServiceUrl" inputmode="decimal" placeholder="192.168.1.20" />
              <button id="testOcrServiceButton" type="button" class="secondary">检测</button>
            </div>
          </label>
          <input id="imageInput" type="file" accept="image/*" />
          <p class="hint" id="ocrHint">电脑运行 OCR 服务后，只填电脑 IP；不填则使用离线识别。</p>
        </div>
      </section>

      <section class="panel" id="manualPanel">
        <form id="courseForm" class="course-form">
          <label>课程名<input name="name" required placeholder="数据结构" /></label>
          <div class="form-grid">
            <label>星期
              <select name="weekday">
                <option value="1">周一</option>
                <option value="2">周二</option>
                <option value="3">周三</option>
                <option value="4">周四</option>
                <option value="5">周五</option>
                <option value="6">周六</option>
                <option value="7">周日</option>
              </select>
            </label>
            <label>节次<input name="period" required placeholder="3-4节" /></label>
          </div>
          <div class="form-grid">
            <label>上课周<input name="weeks" required placeholder="1-16周 / 2-12周 双周" /></label>
            <label>地点<input name="location" required placeholder="教学楼A101" /></label>
          </div>
          <label>授课老师<input name="teacher" placeholder="张老师" /></label>
          <button type="submit">添加课程</button>
        </form>
      </section>

      <section class="panel" id="reviewPanel">
        <div class="review-toolbar">
          <span id="courseCount">0 门课程</span>
          <button class="danger" id="clearButton">清空</button>
        </div>
        <div id="reviewList" class="review-list"></div>
      </section>
    </main>

    <dialog id="settingsDialog">
      <form method="dialog" class="dialog-card">
        <h2>学期设置</h2>
        <section class="schedule-settings">
          <h3>课表管理</h3>
          <label>当前课表
            <select id="scheduleSelect"></select>
          </label>
          <div class="inline-row">
            <input id="newScheduleName" placeholder="新课表名称，例如：大一下" />
            <button type="button" class="secondary" id="addScheduleButton">新建</button>
          </div>
          <button type="button" class="ghost danger-text" id="deleteScheduleButton">删除当前课表</button>
        </section>
        <label>开学第一周周一
          <input id="termStart" type="date" />
        </label>
        <section class="period-settings">
          <h3>每节课时间</h3>
          <button type="button" class="secondary" id="addPeriodButton">添加一节</button>
          <div id="periodEditor" class="period-editor"></div>
        </section>
        <button id="saveSettings" value="default">保存</button>
      </form>
    </dialog>

    <script type="module" src="./src/app.mjs"></script>
  </body>
</html>
