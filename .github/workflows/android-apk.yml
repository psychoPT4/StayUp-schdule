name: Build Android APK

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm install

      - name: Test parser
        run: npm test

      - name: Build web assets
        run: npm run build

      - name: Generate Android project
        run: npx cap add android

      - name: Sync Android assets
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug
          cd ..
          cp android/app/build/outputs/apk/debug/app-debug.apk StayUp-schedule-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: StayUp-schedule-debug-apk
          path: StayUp-schedule-debug.apk

      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" || gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes "Android debug APK for testing."
          gh release upload "$GITHUB_REF_NAME" StayUp-schedule-debug.apk --clobber
